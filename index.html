function formatDate(d){
const dt=new Date(d);
return `${String(dt.getDate()).padStart(2,'0')}-${String(dt.getMonth()+1).padStart(2,'0')}-${dt.getFullYear()}`;
}

function getReportName(){
return window.savedReportName || `${storeSelect.value} Near Expiry Report ${formatDate(new Date())}`;
}

function load(list){
articleSelect.innerHTML='<option value="">Select Article</option>';
list.forEach(d=>{
let o=document.createElement("option");
o.value=d.code;
o.text=d.code+" - "+d.name;
articleSelect.appendChild(o);
});
}
load(data);

// SEARCH
searchBox.addEventListener("input",function(){
const v=this.value.toLowerCase();
const box=document.getElementById("suggestions");

if(!v){box.style.display="none";return;}

const filtered=data.filter(d =>
String(d.code).includes(v) ||
(d.name && d.name.toLowerCase().includes(v))
);

box.innerHTML="";
filtered.slice(0,10).forEach(item=>{
const div=document.createElement("div");
div.textContent=item.code+" - "+item.name;

div.onclick=function(){
articleSelect.value=item.code;
searchBox.value=item.code+" - "+item.name;
box.style.display="none";
articleSelect.dispatchEvent(new Event("change"));
};

box.appendChild(div);
});
box.style.display="block";
});

// hide suggestions
document.addEventListener("click",function(e){
if(!e.target.closest("#searchBox") && !e.target.closest("#suggestions")){
suggestions.style.display="none";
}
});

let reportList=[];

expiryDisplay.onclick=()=>expiryDate.showPicker();
expiryDate.onchange=calculateShelfLife;

// reset on product change
articleSelect.addEventListener("change", function(){
expiryDate.value="";
expiryDisplay.value="";
output.innerHTML="";
output.className="";
addBtn.style.display="none";
quantity.value="";
window.currentResult=null;
});

// ✅ FIXED CALCULATION
function calculateShelfLife(){

if(!storeSelect.value){
alert("Please select store first");
return;
}

const expiry=expiryDate.value;
if(!expiry) return;

expiryDisplay.value=formatDate(expiry);

const item=data.find(d=>d.code===articleSelect.value);
if(!item) return;

const days=Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24));
const percent = (days / item.shelfLife) * 100;

window.currentResult={
store:storeSelect.value,
code:item.code,
name:item.name,
expiry:formatDate(expiry),
percent:percent.toFixed(2),
qty:""
};

if(percent < 50){
output.innerHTML=`⚠️ ${percent.toFixed(2)}% remaining<br>
Liquidation needed – Please add to report<br>
Total Shelf Life: ${item.shelfLife} days`;
output.className="bad";
addBtn.style.display="block";
}else{
output.innerHTML=`✅ ${percent.toFixed(2)}% remaining<br>
Enough shelf life<br>
Total Shelf Life: ${item.shelfLife} days`;
output.className="ok";
addBtn.style.display="none";
}
}

// ADD
function addToList(){
if(!storeSelect.value){alert("Select store");return;}
if(!quantity.value){alert("Enter qty");return;}

currentResult.qty=quantity.value;
reportList.push(currentResult);
update();

searchBox.value="";
expiryDisplay.value="";
expiryDate.value="";
quantity.value="";
output.innerHTML="";
addBtn.style.display="none";
}

// UPDATE
function update(){
let total=0;
reportTable.querySelector("tbody").innerHTML="";

reportList.forEach((r,i)=>{
total+=Number(r.qty);
reportTable.querySelector("tbody").innerHTML+=`
<tr>
<td>${r.store}</td>
<td>${r.code}</td>
<td>${r.name}</td>
<td>${r.expiry}</td>
<td>${r.percent}%</td>
<td>${r.qty}</td>
<td><button onclick="removeItem(${i})">❌</button></td>
</tr>`;
});

totalQty.innerText="Total Qty: "+total;
}

function removeItem(i){reportList.splice(i,1);update();}

function clearAll(){
reportList=[];
localStorage.removeItem("reportDraft");
update();
}

// EXPORT
function generateCSV(){
let csv="Store,Code,Name,Expiry,Shelf Life %,Qty\n";
reportList.forEach(r=>{
csv+=`${r.store},${r.code},${r.name},${r.expiry},${r.percent}%,${r.qty}\n`;
});
return new Blob([csv]);
}

function exportExcel(){
const a=document.createElement("a");
a.href=URL.createObjectURL(generateCSV());
a.download=getReportName()+".csv";
a.click();
}

// PDF
function generatePDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
const rows=reportList.map(r=>[r.store,r.code,r.name,r.expiry,r.percent+"%",r.qty]);
doc.text(getReportName(),14,15);
doc.autoTable({head:[["Store","Code","Name","Expiry","Shelf Life %","Qty"]],body:rows,startY:20});
return doc.output("blob");
}

function exportPDF(){
const a=document.createElement("a");
a.href=URL.createObjectURL(generatePDF());
a.download=getReportName()+".pdf";
a.click();
}

// SHARE (FIXED)
async function sharePDF(){
try{
const file=new File([generatePDF()],getReportName()+".pdf",{type:"application/pdf"});
if(navigator.share){
await navigator.share({files:[file],title:getReportName()});
}else fallbackShare();
}catch(e){fallbackShare();}
}

async function shareExcel(){
try{
const file=new File([generateCSV()],getReportName()+".csv",{type:"text/csv"});
if(navigator.share){
await navigator.share({files:[file],title:getReportName()});
}else fallbackShare();
}catch(e){fallbackShare();}
}

function fallbackShare(){
let text=getReportName()+"\n\n";
reportList.forEach(r=>{
text+=`${r.code} - ${r.name} | ${r.percent}% | Qty:${r.qty}\n`;
});
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// WhatsApp
function sendWhatsApp(){
let text=getReportName()+"\n\nItems:\n";
reportList.forEach((r,i)=>{
text+=`${i+1}. ${r.code} - ${r.name} | Exp: ${r.expiry} | ${r.percent}% | Qty ${r.qty}\n`;
});
text+=`\nTotal Qty: ${reportList.reduce((s,r)=>s+Number(r.qty),0)}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// SAVE
function saveDraft(){
window.savedReportName=getReportName();
localStorage.setItem("reportDraft",JSON.stringify({
name:window.savedReportName,
items:reportList
}));
alert("Draft saved");
}

// LOAD
window.onload=function(){
const saved=localStorage.getItem("reportDraft");
if(saved){
const d=JSON.parse(saved);
reportList=d.items||[];
window.savedReportName=d.name;
update();
}
};
